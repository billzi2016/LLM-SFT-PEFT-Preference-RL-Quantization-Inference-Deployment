# Qwen2.5-7B-Instruct 训练配置

model_name: Qwen/Qwen2.5-7B-Instruct
dataset_path: data/sample_sft.jsonl
output_dir: outputs/qwen2_5_7b

# 单条样本最大 token 长度。调大能容纳更长上下文，但显存占用会上升。
max_seq_length: 2048

# 单张 GPU 每步处理的样本数。显存不足时先调小这个值。
per_device_train_batch_size: 1

# 梯度累积步数。用于用小 batch 模拟更大的全局 batch。
gradient_accumulation_steps: 8

# LoRA/QLoRA 常用学习率。数据少时不要盲目调太大。
learning_rate: 0.0002
num_train_epochs: 1
warmup_ratio: 0.03
logging_steps: 10
save_steps: 100

# Qwen2.5 建议优先使用 bf16。是否可用取决于 GPU。
bf16: true
fp16: false

# 用计算换显存。开启后更省显存，但训练速度会下降。
gradient_checkpointing: true

# 对话训练通常只在 assistant 回答部分计算 loss。
assistant_only_loss: true

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

qlora:
  enabled: false
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
