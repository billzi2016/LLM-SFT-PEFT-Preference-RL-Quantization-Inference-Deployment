# gpt-oss-20b 部署配置

model_name: openai/gpt-oss-20b
chat_format: harmony
reasoning_effort: medium

transformers:
  torch_dtype: auto
  device_map: auto
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.9
  do_sample: true

vllm:
  host: 0.0.0.0
  port: 8000
  dtype: auto
  max_model_len: 8192
  gpu_memory_utilization: 0.90
  tensor_parallel_size: 1
  served_model_name: gpt-oss-20b

sglang:
  # 需要以后续实际版本支持为准；如果当前版本支持不完整，部署 notebook 中要明确说明限制。
  host: 0.0.0.0
  port: 30000
  dtype: auto
  context_length: 8192
  tensor_parallel_size: 1

ollama:
  model: gpt-oss:20b
  num_ctx: 8192
  temperature: 0.7
  top_p: 0.9
